# config.toml

[server]
listen_addr = "0.0.0.0:8443" # ACME 生产环境必须监听 443
# 如果开启 ACME，下面两个文件路径将被忽略，但建议保留作为本地回退
cert_file = "cert.pem"
key_file = "key.pem"
# 新增：JWT 密钥 (生产环境建议从环境变量读取，这里仅做演示)
jwt_secret = "a-string-secret-at-least-256-bits-long"

# === 新增：ACME 配置 ===
[server.acme]
enabled = false                 # 开关
domain = "47.100.136.50.sslip.io" # 真实域名
email = "1539490741@qq.com"    # 用于接收过期通知
production = false             # false=使用测试环境(Staging), true=正式环境
cache_dir = ".acme_cache"      # 证书缓存目录

# === 新增：IP 限流配置 ===
# 每个 IP 每秒允许 10 次请求，突发（Burst）允许 20 次
[server.ip_limit]
requests_per_second = 10
burst = 20

# === 新增：Tracing 配置 ===
[server.tracing]
enabled = true
# Jaeger 的 OTLP gRPC 端口通常是 4317
endpoint = "http://localhost:4317"

# 定义上游服务池 (Map结构: name -> details)
[upstreams]
  # 稳定版集群
  [upstreams.stable]
  urls = ["https://httpbin.org"]

  # 灰度版集群 (为了演示，可以用 postman-echo 或者另一个 httpbin)
  [upstreams.canary]
  urls = ["https://postman-echo.com"]

  # 本地 WS 上游
  [upstreams.local_ws]
  # 注意：虽然是 WebSocket，但底层建立连接时是 TCP/HTTP，
  # 所以这里写 http:// 即可，hyper 会处理握手。
  urls = ["http://127.0.0.1:9001"]

# === 路由规则===
[[routes]]
path = "/api/v1"
upstream = "stable" # 默认走 stable
strip_prefix = true
# 新增：开启鉴权
auth = false
  # 该路由每秒总共允许 50 次请求
  [routes.limit]
  requests_per_second = 1
  burst = 100

  # === 灰度配置 ===
  [routes.canary]
  upstream = "canary" # 灰度流量去哪里
  weight = 20         # 20% 的流量走灰度 (0-100)

  # Header 匹配规则 (可选)
  # 如果请求包含 X-Canary: true，强制走灰度，忽略权重
  header_key = "X-Canary"
  header_value = "true"

[[routes]]
path = "/api/public"
upstream = "stable"
strip_prefix = true
# 默认 false，无需鉴权
auth = false

[[routes]]
path = "/ws"
upstream = "local_ws"
strip_prefix = false
