# config.toml

[server]
listen_addr = "0.0.0.0:443" # ACME 生产环境必须监听 443
# 如果开启 ACME，下面两个文件路径将被忽略，但建议保留作为本地回退
cert_file = "cert.pem"
key_file = "key.pem"

# === 新增：ACME 配置 ===
[server.acme]
enabled = true                 # 开关
domain = "47.100.136.50.sslip.io" # 真实域名
email = "1539490741@qq.com"    # 用于接收过期通知
production = false             # false=使用测试环境(Staging), true=正式环境
cache_dir = ".acme_cache"      # 证书缓存目录

# === 新增：IP 限流配置 ===
# 每个 IP 每秒允许 10 次请求，突发（Burst）允许 20 次
[server.ip_limit]
requests_per_second = 10
burst = 20

# === 新增：Tracing 配置 ===
[server.tracing]
enabled = true
# Jaeger 的 OTLP gRPC 端口通常是 4317
endpoint = "http://localhost:4317"

# 定义上游服务池 (Map结构: name -> details)
[upstreams]
[upstreams.httpbin_cluster]
urls = [
  "https://httpbin.org",
  "https://postman-echo.com"
]

# 1. 定义本地 WS 上游
[upstreams.local_ws]
# 注意：虽然是 WebSocket，但底层建立连接时是 TCP/HTTP，
# 所以这里写 http:// 即可，hyper 会处理握手。
urls = ["http://127.0.0.1:9001"]

# === 路由规则===
[[routes]]
path = "/api/v1"
upstream = "httpbin_cluster"
strip_prefix = true
# 该路由每秒总共允许 50 次请求
[routes.limit]
requests_per_second = 1
burst = 100

[[routes]]
path = "/ws"
upstream = "local_ws"
strip_prefix = false
