# config.toml

[server]
listen_addr = "0.0.0.0:8443"
cert_file = "cert.pem"
key_file = "key.pem"

# 定义上游服务池 (Map结构: name -> details)
[upstreams]
[upstreams.httpbin_cluster]
urls = [
  "https://httpbin.org",
  "https://postman-echo.com"
]

[upstreams.local]
urls = ["http://127.0.0.1:9090"]

# === 路由规则===
[[routes]]
path = "/api/v1"
upstream = "httpbin_cluster"
strip_prefix = true
